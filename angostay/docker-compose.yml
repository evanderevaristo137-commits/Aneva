# AngoStay — ambiente local completo
# docker compose up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: angostay
      POSTGRES_PASSWORD: angostay
      POSTGRES_DB: angostay
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U angostay']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql://angostay:angostay@db:5432/angostay
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      WEB_URL: http://localhost:3000
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/v1
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
